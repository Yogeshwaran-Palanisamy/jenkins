apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
{{- range $val := .Values.rbac }}
metadata:
  name: {{$val.name}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{$val.name}}
subjects:
- kind: ServiceAccount
  name: {{$val.serviceAccountName}}
  namespace: {{$val.namespace}}
{{ end -}}
