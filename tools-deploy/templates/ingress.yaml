{{- $ing := .Values.ingress -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ing.name}}
  namespace: {{$ing.namespace}}
spec:
  ingressClassName: ngrok
  rules:
    - host: "subinvolute-dannette-unreceptively.ngrok-free.dev"
      http:
        paths:
          - path: {{$ing.path}}
            pathType: Prefix
            backend:
              service:
                name: {{$ing.service}}
                port:
                  number: {{$ing.port}}